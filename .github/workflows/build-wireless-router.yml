name: 构建 ImmortalWrt 24.10.x 无线路由器

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: "请选择mtk路由器型号"
        required: true
        options:
          - glinet_gl-mt2500
          - glinet_gl-mt3000
          - glinet_gl-mt6000
          - glinet_gl-axt1800
          - glinet_gl-ax1800
          - glinet_gl-b2200
          - glinet_gl-x3000
          - glinet_gl-xe3000
          - huasifei_wh3000-emmc
          - cudy_tr3000-v1
          - cudy_tr3000-v1-ubootmod
          - cudy_tr3000-256mb-v1
          - jcg_q30-pro
          - jcg_q30
          - jcg_q30-ubootmod
          - jdcloud_re-cp-03
          - xiaomi_mi-router-ax3000t
          - xiaomi_mi-router-ax3000t-ubootmod
          - xiaomi_mi-router-wr30u-stock
          - xiaomi_mi-router-wr30u-ubootmod
          - xiaomi_mi-router-wr30u-112m-nmbm
          - xiaomi_redmi-router-ax6000
          - xiaomi_redmi-router-ax6000-stock
          - xiaomi_redmi-router-ax6000-ubootmod
          - qnap_301w
          - redmi_ax6
          - redmi_ax6-stock
          - xiaomi_redmi-router-ax6s
          - spectrum_sax1v1k
          - tplink_eap660hd-v1
          - xiaomi_ax3600
          - xiaomi_ax3600-stock
          - xiaomi_ax9000
          - xiaomi_ax9000-stock
          - cmcc_a10-stock
          - cmcc_a10-ubootmod
          - cmcc_rax3000m
          - cmcc_rax3000me
          - cmcc_rax3000m-emmc-ubootmod
          - cmcc_rax3000m-nand-ubootmod
          - imou_lc-hx3001-ubootmod
          - qihoo_360t7-ubootmod
        default: xiaomi_redmi-router-ax6000-ubootmod
      custom_router_ip:
        description: "请设置路由器的管理地址"
        required: true
        default: "192.168.100.1"
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: '否'
        type: choice
        options:
          - '是的'
          - '否'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置可执行权限
        run: chmod +x ${{ github.workspace }}/mediatek-filogic/build*.sh

      - name: 保存自定义路由器 IP
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"

      - name: 构建 ImmortalWrt 固件
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          
          case "$profile" in
              xiaomi_redmi-router-ax6000 | xiaomi_redmi-router-ax6000-ubootmod | xiaomi_redmi-router-ax6000-stock)
                  tag=mediatek-filogic-openwrt-23.05.4
                  cp ${{ github.workspace }}/mediatek-filogic/build23.sh ${{ github.workspace }}/mediatek-filogic/build24.sh
                  ;;
              *)
                  tag=mediatek-filogic-openwrt-24.10.5
                  ;;
          esac
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/mediatek-filogic/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$profile" \
            -e INCLUDE_DOCKER="$include_docker" \
            immortalwrt/imagebuilder:$tag /bin/bash -c "
            # 核心：AX6000 128M 强制改为 512M 闪存布局
            find . -name 'filogic.mk' | xargs sed -i 's/IMAGE_SIZE := .*/IMAGE_SIZE := 500000k/g'
            find . -name '*.dts*' | xargs sed -i 's/reg = <0x600000 0x6e00000>/reg = <0x600000 0x1ea00000>/g'
            find . -name '*.dts*' | xargs sed -i 's/104448k/491520k/g'
            find . -name '*.dts*' | xargs sed -i 's/112640k/491520k/g'
            
            # 开启工厂固件支持
            echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
            echo 'CONFIG_TARGET_IMAGE_SQUASHFS_FACTORY=y' >> .config
            
            # 开始编译
            bash /home/build/immortalwrt/build.sh
            
            # 自动生成可直接刷机的 factory.bin 固件
            cd bin/targets/mediatek/filogic/ || exit 1
            for f in *ax6000*sysupgrade.itb; do
                [ -f "\$f" ] && cp "\$f" "\${f%-sysupgrade.itb}-squashfs-factory.bin"
            done
          "

      - name: 上传编译好的固件
        uses: softprops/gh-release@v2.2.1
        with:
          tag_name: ${{ github.event.inputs.profile }}-512G-FIX-${{ github.run_id }}
          name: REDMI_AX6000_512M_FULL_FIRMWARE
          files: |
            bin/targets/mediatek/filogic/*.bin
            bin/targets/mediatek/filogic/*.itb
          token: ${{ secrets.GITHUB_TOKEN }}
